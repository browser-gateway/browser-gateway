version: 1

gateway:
  port: 9500
  defaultStrategy: priority-chain   # priority-chain | round-robin | least-connections | latency-optimized

  cooldown:
    defaultMs: 30000                # Skip failing provider for 30s
    failureThreshold: 0.5           # Cooldown if >50% of connections fail
    minRequestVolume: 3             # Need 3+ attempts before evaluating

  sessions:
    idleTimeoutMs: 300000           # Close idle sessions after 5 min
    reconnectTimeoutMs: 300000      # Keep disconnected sessions for reconnection (5 min)

providers:
  cloud-provider:
    url: wss://provider.example.com?token=${PROVIDER_TOKEN}
    limits:
      maxConcurrent: 5
    priority: 1

  my-playwright:
    url: ws://localhost:4000
    limits:
      maxConcurrent: 10
    priority: 2

  # Add as many providers as you need:
  #
  # my-chrome:
  #   url: http://192.168.1.100:9222   # Chrome CDP (auto-discovers WebSocket endpoint)
  #   limits:
  #     maxConcurrent: 1
  #   priority: 3

# Session pool for REST API (/v1/screenshot, /v1/content, /v1/scrape)
# The pool keeps browser sessions alive and serves pages from them.
pool:
  minSessions: 0                    # 0 = scale to zero when idle (no browser running)
  maxSessions: 5                    # Max browser connections from pool
  maxPagesPerSession: 10            # Pages per browser before creating another
  retireAfterPages: 100             # Recycle browser after this many total pages
  retireAfterMs: 3600000            # Recycle after 1 hour max
  idleTimeoutMs: 300000             # Close idle browsers after 5 min

dashboard:
  enabled: true

logging:
  level: info                       # debug | info | warn | error

name: docker

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if this version is already published"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/server

jobs:
  check:
    name: Version check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should-build: ${{ steps.decide.outputs.should-build }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: read
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to build
        id: decide
        env:
          VERSION: ${{ steps.read.outputs.version }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "::notice::Force build requested for $VERSION"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if docker buildx imagetools inspect "$REGISTRY/$IMAGE_NAME:$VERSION" > /dev/null 2>&1; then
            echo "::notice title=Skipped::Version $VERSION is already on $REGISTRY/$IMAGE_NAME — bump package.json or re-run with force=true to override"
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Will build::Version $VERSION is not yet on $REGISTRY/$IMAGE_NAME"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint Dockerfile
    needs: check
    if: needs.check.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build:
    name: Build (${{ matrix.platform }})
    needs: [check, lint]
    if: needs.check.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export per-platform digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${{ steps.build.outputs.digest }}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge + sign
    needs: [check, build]
    if: needs.check.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.check.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@%s ' *)

      - name: Inspect merged digest
        id: inspect
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### browser-gateway docker release"
            echo ""
            echo "**Version**: \`${{ needs.check.outputs.version }}\`"
            echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}\`"
            echo "**Tags**: \`${{ needs.check.outputs.version }}\`, \`latest\`"
            echo "**Digest**: \`${{ steps.inspect.outputs.digest }}\`"
            echo "**Architectures**: linux/amd64, linux/arm64"
          } >> "$GITHUB_STEP_SUMMARY"
